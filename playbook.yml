- name: Setup Fedora Server for k3s
  hosts: localhost
  connection: local
  become: true
  vars:
    k3s_host_modules:
      - br_netfilter
      - overlay
  tasks:
    - name: Configure system hostname
      ansible.builtin.hostname:
        name: "prodesk"
    - name: Additional packages
      ansible.builtin.dnf:
        name:
          - atuin
          - figlet
          - kubernetes-client
          - neovim
          - zsh
        state: present
    ###
    # SSH
    ###
    - name: Set PermitRootLogin to prohibit-password
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        state: present
        backup: true

    - name: Validate sshd config
      ansible.builtin.command: sshd -t
      changed_when: false

    - name: Reload SSH service
      ansible.builtin.service:
        name: sshd
        state: reloaded

    - name: Restart SSH service
      ansible.builtin.service:
        name: sshd
        state: restarted
    ###
    ## K3S requirements
    ###
    - name: Kernel modules for k3s
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          {% for m in k3s_host_modules %}
          {{ m }}
          {% endfor %}
        owner: root
        group: root
        mode: "0644"
      notify: Restart systemd-modules-load
    - name: Sysctl settings for k3s
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-k3s.conf
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-capp-ip6tables = 1
        owner: root
        group: root
        mode: "0644"
      notify: Reload sysctl
    - name: Configure NetworkManager to ignore k3s CNI interfaces
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/k3s.conf
        content: |
          [keyfile]
          unmanaged-devices=interface-name:cni0;interface-name:flannel.1
        owner: root
        group: root
        mode: "0644"
      notify: Restart NetworkManager
    - name: Open k3s ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - 6443/tcp
        - 10250/tcp
    - name: Runtime swap off (non-persistent)
      ansible.builtin.command: swapoff -a
      changed_when: false
    ###
    ## K3S installation
    ###
    - name: Install k3s
      ansible.builtin.command: files/k3s_install.sh
      environment:
        INSTALL_K3S_VERSION: "v1.35.3+k3s1"
      args:
        creates: /usr/local/bin/k3s
    - name: Setup kubectl for root
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp /etc/rancher/k3s/k3s.yaml /root/.kube/config
      args:
        creates: /root/.kube/config
  handlers:
    ###
    ## K3S requirements
    ###
    - name: Restart systemd-modules-load
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: "{{ k3s_host_modules }}"
    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false
    - name: Restart NetworkManager
      ansible.builtin.systemd:
        name: NetworkManager
        state: restarted
