- name: Setup Fedora Server for k3s
  hosts: localhost
  connection: local
  become: true
  vars:
    ###
    # K3S
    ###
    k3s_host_modules:
      - br_netfilter
      - overlay
    kubeconfig: /root/.kube/config
    ###
    # FluxCD
    ###
    forgejo_namespace: forgejo
    forgejo_release: 17.0.0
    # forgejo_hostname: forgejo.local
    # forgejo_admin_username: my_admin
    # forgejo_admin_password: change-me
    # forgejo_admin_email: admin@example.com
    # flux_user: flux
    # flux_user_password: change-me
    flux_release: 2.8.5
    git_repo: flux-config
    git_branch: main
    git_path: clusters/rift
  vars_files:
    - flux.vars
  tasks:
    - name: Configure system hostname
      ansible.builtin.hostname:
        name: "prodesk"
    - name: Additional packages
      ansible.builtin.dnf:
        name:
          - atuin
          - figlet
          - helm
          - neovim
          - zsh
        state: present
    ###
    # SSH
    ###
    - name: Set PermitRootLogin to prohibit-password
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        state: present
        backup: true

    - name: Validate sshd config
      ansible.builtin.command: sshd -t
      changed_when: false

    - name: Reload SSH service
      ansible.builtin.service:
        name: sshd
        state: reloaded

    - name: Restart SSH service
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: Firewalld has been enabled
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true
    ###
    ## K3S requirements
    ###
    - name: Kernel modules for k3s
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          {% for m in k3s_host_modules %}
          {{ m }}
          {% endfor %}
        owner: root
        group: root
        mode: "0644"
      notify: Restart systemd-modules-load

    - name: Sysctl settings for k3s
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-k3s.conf
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-capp-ip6tables = 1
        owner: root
        group: root
        mode: "0644"
      notify: Reload sysctl
    - name: Configure NetworkManager to ignore k3s CNI interfaces
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/k3s.conf
        content: |
          [keyfile]
          unmanaged-devices=interface-name:cni0;interface-name:flannel.1
        owner: root
        group: root
        mode: "0644"
      notify: Restart NetworkManager
    - name: Open k3s ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - 6443/tcp    # k3s API server
        - 10250/tcp   # kubelet
        - 80/tcp      # Traefik HTTP
        - 443/tcp     # Traefik HTTPS
        - 30222/tcp   # Forgejo SSH NodePort
        - 8472/udp    # Flannel VXLAN (pod-to-pod overlay)
        - 51820/udp   # Flannel WireGuard (if used)
    - name: Trust pod and service CIDRs
      ansible.posix.firewalld:
        source: "{{ item }}"
        zone: trusted
        permanent: true
        state: enabled
        immediate: true
      loop:
        - 10.42.0.0/16   # k3s pod CIDR
        - 10.43.0.0/16   # k3s service CIDR
    - name: Trust CNI interfaces
      ansible.posix.firewalld:
        interface: "{{ item }}"
        zone: trusted
        permanent: true
        state: enabled
        immediate: true
      loop:
        - cni0
        - flannel.1
    - name: Runtime swap off (non-persistent)
      ansible.builtin.command: swapoff -a
      changed_when: false
    ###
    ## K3S installation
    ###
    - name: Install k3s
      ansible.builtin.command: files/k3s_install.sh
      environment:
        INSTALL_K3S_VERSION: "v1.35.3+k3s1"
      args:
        creates: /usr/local/bin/k3s
    - name: Setup kubectl for root
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp /etc/rancher/k3s/k3s.yaml "{{ kubeconfig }}"
      args:
        creates: "{{ kubeconfig }}"
    ###
    # Forgejo installation
    ###
    - name: Create forgejo-values.yml
      ansible.builtin.template:
        src: files/forgejo-values.yml.j2
        dest: /tmp/forgejo-values-{{ forgejo_release }}.yml
    - name: Install/upgrade Forgejo
      ansible.builtin.command:
        cmd: >
          helm upgrade --install forgejo
          oci://code.forgejo.org/forgejo-helm/forgejo
          --version {{ forgejo_release }}
          --namespace {{ forgejo_namespace }}
          -f /tmp/forgejo-values-{{ forgejo_release }}.yml
          --create-namespace
    - name: Wait for Forgejo rollout
      ansible.builtin.command:
        cmd: >
          kubectl rollout status deployment
          -l app.kubernetes.io/instance=forgejo
          -n {{ forgejo_namespace }}
          --timeout=300s
      changed_when: false
    - name: Wait for Forgejo HTTP
      ansible.builtin.uri:
        url: "http://{{ forgejo_hostname }}/api/healthz"
        status_code: 200
      register: forgejo_health
      retries: 20
      delay: 5
      until: forgejo_health.status == 200
    - name: Check if admin user exists
      ansible.builtin.uri:
        url: "http://{{ forgejo_hostname }}/api/v1/users/{{ forgejo_admin_username }}"
        method: GET
        status_code: [200, 404]
      register: admin_check
    - name: Create admin user (only if missing)
      ansible.builtin.shell: >
        kubectl exec -n {{ forgejo_namespace }} deploy/forgejo --
        forgejo admin user create
        --username {{ forgejo_admin_username }}
        --password {{ forgejo_admin_password }}
        --email {{ forgejo_admin_email }}
        --admin
      when: admin_check.status == 404
    ###
    # FluxCD preparations
    ###
    - name: Check if flux user exists
      ansible.builtin.uri:
        url: "http://{{ forgejo_hostname }}/api/v1/users/{{ flux_user }}"
        user: "{{ forgejo_admin_username }}"
        password: "{{ forgejo_admin_password }}"
        force_basic_auth: true
        status_code: [200, 404]
      register: flux_user_check
    - name: Create flux user
      ansible.builtin.uri:
        url: "http://{{ forgejo_hostname }}/api/v1/admin/users"
        method: POST
        user: "{{ forgejo_admin_username }}"
        password: "{{ forgejo_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          username: "{{ flux_user }}"
          password: "{{ flux_user_password }}"
          email: "flux@example.com"
          must_change_password: false
        status_code: 201
      when: flux_user_check.status == 404

  handlers:
    ###
    ## K3S requirements
    ###
    - name: Restart systemd-modules-load
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: "{{ k3s_host_modules }}"
    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false
    - name: Restart NetworkManager
      ansible.builtin.systemd:
        name: NetworkManager
        state: restarted
