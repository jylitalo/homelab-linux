- name: Setup Fedora Server for k3s
  hosts: localhost
  connection: local
  become: true
  vars:
    ###
    # K3S
    ###
    k3s_host_modules:
      - br_netfilter
      - overlay
    kubeconfig: /root/.kube/config
    ###
    # FluxCD
    ###
    flux_release: 2.8.6
    git_repo: flux-config
    git_branch: main
  vars_files:
    - flux.vars
  tasks:
    - name: Configure system hostname
      ansible.builtin.hostname:
        name: "prodesk"
    - name: Additional packages
      ansible.builtin.dnf:
        name:
          - atuin
          - figlet
          - helm
          - neovim
          - pwgen
          - zsh
        state: present
    ###
    # bashrc & nvim
    ###
    - name: Ensure EDITOR is set in ~/.bashrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: "export EDITOR=nvim"
        state: present
        create: true
    - name: Ensure EDITOR is set in ~/.bashrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: "alias vim=nvim"
        state: present
        create: true
    ###
    # SSH
    ###
    - name: Set PermitRootLogin to prohibit-password
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        state: present
        backup: true

    - name: Validate sshd config
      ansible.builtin.command: sshd -t
      changed_when: false

    - name: Reload SSH service
      ansible.builtin.service:
        name: sshd
        state: reloaded

    - name: Restart SSH service
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: Firewalld has been enabled
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true
    ###
    ## K3S requirements
    ###
    - name: Kernel modules for k3s
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          {% for m in k3s_host_modules %}
          {{ m }}
          {% endfor %}
        owner: root
        group: root
        mode: "0644"
      notify: Restart systemd-modules-load

    - name: Sysctl settings for k3s
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-k3s.conf
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-capp-ip6tables = 1
        owner: root
        group: root
        mode: "0644"
      notify: Reload sysctl
    - name: Configure NetworkManager to ignore k3s CNI interfaces
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/k3s.conf
        content: |
          [keyfile]
          unmanaged-devices=interface-name:cni0;interface-name:flannel.1
        owner: root
        group: root
        mode: "0644"
      notify: Restart NetworkManager
    - name: Open k3s ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - 80/tcp      # Traefik HTTP
        - 443/tcp     # Traefik HTTPS
        - 6443/tcp    # k3s API server
        - 8472/udp    # Flannel VXLAN (pod-to-pod overlay)
        - 10250/tcp   # kubelet
        - 30222/tcp   # Forgejo SSH NodePort
        - 51820/udp   # Flannel WireGuard (if used)
    - name: Trust pod and service CIDRs
      ansible.posix.firewalld:
        source: "{{ item }}"
        zone: trusted
        permanent: true
        state: enabled
        immediate: true
      loop:
        - 10.42.0.0/16   # k3s pod CIDR
        - 10.43.0.0/16   # k3s service CIDR
    - name: Trust CNI interfaces
      ansible.posix.firewalld:
        interface: "{{ item }}"
        zone: trusted
        permanent: true
        state: enabled
        immediate: true
      loop:
        - cni0
        - flannel.1
    - name: Runtime swap off (non-persistent)
      ansible.builtin.command: swapoff -a
      changed_when: false
    ###
    ## K3S installation
    ###
    - name: Install k3s
      ansible.builtin.command: files/k3s_install.sh
      environment:
        INSTALL_K3S_VERSION: "v1.35.3+k3s1"
      args:
        creates: /usr/local/bin/k3s
    - name: Setup kubectl for root
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp /etc/rancher/k3s/k3s.yaml "{{ kubeconfig }}"
      args:
        creates: "{{ kubeconfig }}"
    ###
    ## fluxcd setup
    ###
    - name: Check if flux SSH key exists
      ansible.builtin.stat:
        path: /root/.ssh/id_flux
      register: flux_key
    - name: Generate ECDSA SSH key for flux if missing
      ansible.builtin.command:
        cmd: ssh-keygen -t ecdsa -b 521 -N '' -f /root/.ssh/id_flux
        creates: /root/.ssh/id_flux
      when: not flux_key.stat.exists
    - name: Ensure fluxcd user exists
      ansible.builtin.user:
        name: fluxcd
        state: present
        create_home: true
        shell: /bin/bash
    - name: Directories for fluxcd
      ansible.builtin.file:
        path: "/home/fluxcd/{{ item }}"
        state: directory
        owner: fluxcd
        group: fluxcd
        mode: 0700
      loop:
        - .ansible/tmp
        - .ssh
        - gitops.git
    - name: Copy file with permissions
      ansible.builtin.copy:
        src: /root/.ssh/id_flux.pub
        dest: /home/fluxcd/.ssh/authorized_keys
        owner: fluxcd
        group: fluxcd
        mode: "0700"
    - name: Create repo
      ansible.builtin.command:
        cmd: git init --bare --initial-branch=main
        chdir: /home/fluxcd/gitops.git
        creates: /home/fluxcd/gitops.git/refs
      become: true
      become_user: fluxcd
    - name: Install flux
      ansible.builtin.command:
        cmd: files/flux-install.sh
        creates: /usr/local/bin/flux
    - name: Bootstrap fluxcd
      ansible.builtin.command:
        cmd: flux bootstrap git --url=ssh://fluxcd@git.ylitalot.com:22/home/fluxcd/gitops.git --branch=main --path=clusters/homelab --private-key-file=/root/.ssh/id_flux --silent
        creates: /home/fluxcd/gitops.git/clusters/homelab
    ###
    # perf tuning
    ###
    - name: Ensure custom inotify limits configuration file exists
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/99-kubernetes-inotify.conf
        line: "{{ item.key }} = {{ item.value }}"
        regexp: "^{{ item.key | regex_escape() }}\\s*="
        state: present
        create: true
        mode: '0644'
      loop:
        - { key: 'fs.inotify.max_user_watches', value: '524288' }
        - { key: 'fs.inotify.max_user_instances', value: '512' }
      become: true
      register: sysctl_config

    - name: Apply sysctl settings immediately if configuration changed
      ansible.builtin.command: sysctl --system
      become: true
      when: sysctl_config.changed

  handlers:
    ###
    ## K3S requirements
    ###
    - name: Restart systemd-modules-load
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: "{{ k3s_host_modules }}"
    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false
    - name: Restart NetworkManager
      ansible.builtin.systemd:
        name: NetworkManager
        state: restarted
